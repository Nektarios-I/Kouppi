name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install (frozen lockfile — must match package.json)
        run: |
          if ! pnpm install --frozen-lockfile; then
            echo "::error::pnpm-lock.yaml is out of date with package.json (Vercel fails the same way). Run 'pnpm install' at the repo root and commit pnpm-lock.yaml together with any package.json dependency changes."
            exit 1
          fi
      - run: pnpm -w test
      - run: pnpm -w build
