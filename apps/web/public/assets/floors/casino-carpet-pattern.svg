<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <pattern id="royal-carpet" width="320" height="320" patternUnits="userSpaceOnUse">
      <rect width="320" height="320" fill="#141828"/>
      <!-- ornate frame -->
      <rect x="8" y="8" width="304" height="304" fill="none" stroke="#2a3858" stroke-width="2"/>
      <rect x="20" y="20" width="280" height="280" fill="none" stroke="#1e2840" stroke-width="0.6"/>
      <!-- corner flourishes -->
      <path d="M20 20 Q60 20 60 60 Q20 60 20 20" fill="none" stroke="#3a4870" stroke-width="1"/>
      <path d="M300 20 Q260 20 260 60 Q300 60 300 20" fill="none" stroke="#3a4870" stroke-width="1"/>
      <path d="M20 300 Q60 300 60 260 Q20 260 20 300" fill="none" stroke="#3a4870" stroke-width="1"/>
      <path d="M300 300 Q260 300 260 260 Q300 260 300 300" fill="none" stroke="#3a4870" stroke-width="1"/>
      <!-- center medallion -->
      <circle cx="160" cy="160" r="56" fill="#1a2038" stroke="#3a5080" stroke-width="1.5"/>
      <circle cx="160" cy="160" r="40" fill="none" stroke="#2a4068" stroke-width="0.8"/>
      <path d="M160 120 L168 152 L200 152 L174 172 L182 204 L160 184 L138 204 L146 172 L120 152 L152 152 Z" fill="none" stroke="#4a6090" stroke-width="0.8" opacity="0.7"/>
      <!-- cross bands -->
      <rect x="150" y="0" width="20" height="320" fill="#181e30" opacity="0.4"/>
      <rect x="0" y="150" width="320" height="20" fill="#181e30" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="320" height="320" fill="url(#royal-carpet)"/>
</svg>
