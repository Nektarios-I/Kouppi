<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="dw" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3828"/>
      <stop offset="50%" stop-color="#3d2814"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.06 0.35" numOctaves="4"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <ellipse cx="400" cy="250" rx="400" ry="250" fill="url(#dw)" filter="url(#grain)"/>
  <ellipse cx="400" cy="250" rx="400" ry="250" fill="url(#shine)"/>
</svg>
