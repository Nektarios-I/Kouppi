<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="blk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="40%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="tex">
      <feTurbulence type="fractalNoise" baseFrequency="0.1 0.5" numOctaves="2"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <ellipse cx="400" cy="250" rx="400" ry="250" fill="url(#blk)" filter="url(#tex)"/>
  <ellipse cx="400" cy="250" rx="400" ry="250" fill="url(#shine)"/>
  <ellipse cx="400" cy="250" rx="388" ry="240" fill="none" stroke="#222" stroke-width="2"/>
</svg>
